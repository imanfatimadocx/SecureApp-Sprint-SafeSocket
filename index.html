<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>SafeSocket - Secure Chat Application</title>
    
    <!-- SECURITY FIX: Clickjacking prevention -->
    <meta http-equiv="X-Frame-Options" content="DENY">
    <meta http-equiv="Content-Security-Policy" content="frame-ancestors 'none'">
    
    <link rel='stylesheet prefetch' href='https://fonts.googleapis.com/css?family=Open+Sans'>
    
    <style>
        /* Embedded CSS - Prevents external tampering */
        * {
            box-sizing: border-box;
        }
        body {
            background: #4e5d6c;
            font: 16px 'Open Sans', sans-serif;
            margin: 0;
            padding: 0;
        }
        .chat {
            background: #2d3e4b;
            border-radius: 5px;
            box-shadow: 0 1px 5px rgba(0,0,0,0.2);
            margin: 20px auto;
            max-width: 800px;
            overflow: hidden;
        }
        .chat-title {
            background: #1a2a36;
            color: #fff;
            padding: 15px 20px;
            position: relative;
        }
        .chat-title h1 {
            font-size: 18px;
            margin: 0;
        }
        .avatar {
            position: absolute;
            right: 20px;
            top: 10px;
        }
        .avatar img {
            border-radius: 50%;
            height: 40px;
            width: 40px;
        }
        .messages {
            height: 400px;
            overflow-y: auto;
            padding: 10px 20px;
        }
        .message {
            color: #fff;
            margin-bottom: 15px;
            position: relative;
        }
        .message .message-username {
            font-weight: bold;
            margin-bottom: 5px;
            font-size: 12px;
            color: #aaa;
        }
        .message .message-text {
            background: #1e2f3a;
            border-radius: 10px;
            display: inline-block;
            padding: 8px 12px;
        }
        .my-message {
            text-align: right;
        }
        .my-message .message-text {
            background: #2c8392;
        }
        .message-box {
            background: #1a2a36;
            display: flex;
            padding: 15px 20px;
        }
        .message-input {
            background: #2d3e4b;
            border: none;
            border-radius: 5px;
            color: #fff;
            flex: 1;
            margin-right: 10px;
            padding: 12px;
            resize: none;
            font-family: inherit;
        }
        .message-submit {
            background: #2c8392;
            border: none;
            border-radius: 5px;
            color: #fff;
            cursor: pointer;
            padding: 0 20px;
        }
        .message-submit:hover {
            background: #3da5b8;
        }
        .online-bullet {
            background: #4caf50;
            border-radius: 50%;
            display: inline-block;
            height: 10px;
            margin-left: 10px;
            width: 10px;
        }
        .login-overlay {
            background: rgba(0,0,0,0.95);
            height: 100%;
            left: 0;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-box {
            background: #2d3e4b;
            border-radius: 10px;
            padding: 30px;
            text-align: center;
            width: 320px;
        }
        .login-box h2 {
            color: #fff;
            margin-bottom: 20px;
        }
        .login-box input {
            background: #1a2a36;
            border: none;
            border-radius: 5px;
            color: #fff;
            padding: 12px;
            width: 100%;
            margin-bottom: 10px;
        }
        .login-box button {
            background: #2c8392;
            border: none;
            border-radius: 5px;
            color: #fff;
            cursor: pointer;
            padding: 12px;
            width: 100%;
        }
        .login-box button:hover {
            background: #3da5b8;
        }
        .error-message {
            color: #e74c3c;
            margin-top: 10px;
            font-size: 14px;
        }
        .private-hint {
            color: #aaa;
            font-size: 12px;
            margin-top: 10px;
            text-align: center;
        }
    </style>
</head>
<body>

<!-- Login Overlay -->
<div id="loginOverlay" class="login-overlay">
    <div class="login-box">
        <h2>🔒 SafeSocket Chat</h2>
        <input type="text" id="usernameInput" placeholder="Enter username (max 20 chars)" maxlength="20">
        <button id="loginBtn">Join Secure Chat</button>
        <div id="loginError" class="error-message"></div>
        <div class="private-hint">💡 Private message: @username message</div>
    </div>
</div>

<!-- Main Chat Interface -->
<div class="chat" id="chatContainer" style="display:none;">
    <div class="chat-title">
        <h1>🔒 SafeSocket Secure Chat</h1>
        <figure class="avatar">
            <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='white'%3E%3Cpath d='M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z'/%3E%3C/svg%3E" alt="avatar">
        </figure>
        <span class="online-bullet"></span>
    </div>
    <div class="messages">
        <div class="messages-content"></div>
    </div>
    <div class="message-box">
        <textarea class="message-input" placeholder="Type message... (press Enter to send)" id="messageInput"></textarea>
        <button class="message-submit" id="sendBtn">Send</button>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/2.1.3/jquery.min.js"></script>

<script>
    // ========== SECURE CLIENT-SIDE CODE ==========
    
    // DOM Elements
    const loginOverlay = document.getElementById('loginOverlay');
    const chatContainer = document.getElementById('chatContainer');
    const usernameInput = document.getElementById('usernameInput');
    const loginBtn = document.getElementById('loginBtn');
    const loginError = document.getElementById('loginError');
    const sendBtn = document.getElementById('sendBtn');
    const messageInput = document.getElementById('messageInput');
    const messagesContent = document.querySelector('.messages-content');
    
    let socket = null;
    let currentUsername = null;
    let csrfToken = null;
    let isConnected = false;
    
    // ========== XSS PREVENTION: Sanitize input ==========
    function sanitizeInput(input) {
        if (!input) return '';
        if (typeof input !== 'string') return '';
        const div = document.createElement('div');
        div.textContent = input;
        return div.innerHTML;
    }
    
    // ========== CSRF TOKEN HANDLING ==========
    function getCsrfToken() {
        return csrfToken;
    }
    
    // ========== ADD MESSAGE TO CHAT (With XSS protection) ==========
    function addMessageToChat(username, message, isPrivate = false) {
        const sanitizedUsername = sanitizeInput(username);
        const sanitizedMessage = sanitizeInput(message);
        
        const messageDiv = document.createElement('div');
        messageDiv.className = 'message';
        
        if (currentUsername === sanitizedUsername) {
            messageDiv.classList.add('my-message');
        }
        
        let displayName = sanitizedUsername;
        if (isPrivate) {
            displayName = '🔒 ' + sanitizedUsername;
        }
        
        messageDiv.innerHTML = `
            <div class="message-username">${displayName}</div>
            <div class="message-text">${sanitizedMessage}</div>
        `;
        
        messagesContent.appendChild(messageDiv);
        
        // Scroll to bottom
        const messagesDiv = document.querySelector('.messages');
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }
    
    // ========== CONNECT TO SECURE SOCKET ==========
    function connectSocket() {
        socket = io({
            transports: ['websocket'],  // WebSocket only - more secure
            reconnectionAttempts: 3,
            timeout: 10000
        });
        
        // Receive CSRF token from server
        socket.on('csrf_token', (token) => {
            csrfToken = token;
            console.log('✅ CSRF token received');
        });
        
        socket.on('connect', () => {
            console.log('✅ Connected securely to server');
            isConnected = true;
        });
        
        socket.on('connect_error', (error) => {
            console.error('Connection error:', error);
            loginError.textContent = 'Connection failed. Please refresh the page.';
        });
        
        // Receive public messages
        socket.on('updatechat', (username, message) => {
            addMessageToChat(username, message);
        });
        
        // Receive private messages
        socket.on('msg_user_handle', (fromUser, message) => {
            addMessageToChat(fromUser, message, true);
        });
        
        // Handle server errors
        socket.on('error', (errorMessage) => {
            console.error('Server error:', errorMessage);
            alert('⚠️ Security Error: ' + errorMessage);
        });
        
        // Confirm user was stored
        socket.on('store_username', (username) => {
            currentUsername = username;
            loginOverlay.style.display = 'none';
            chatContainer.style.display = 'block';
            addMessageToChat('🔒 System', 'Welcome ' + username + '! Your connection is secure with CSRF protection.');
        });
    }
    
    // ========== LOGIN WITH CSRF TOKEN ==========
    function login() {
        let username = usernameInput.value.trim();
        
        // Input validation
        if (!username) {
            loginError.textContent = 'Please enter a username';
            return;
        }
        
        if (username.length > 20) {
            loginError.textContent = 'Username too long (max 20 characters)';
            return;
        }
        
        if (username.length < 3) {
            loginError.textContent = 'Username must be at least 3 characters';
            return;
        }
        
        // Sanitize username
        username = sanitizeInput(username);
        
        // Connect to server
        connectSocket();
        
        // Wait for CSRF token then send login
        const waitForToken = setInterval(() => {
            if (csrfToken) {
                clearInterval(waitForToken);
                socket.emit('adduser', username, csrfToken);
            }
        }, 100);
        
        // Timeout
        setTimeout(() => {
            if (!csrfToken) {
                loginError.textContent = 'Connection timeout. Please refresh.';
            }
        }, 5000);
    }
    
    // ========== SEND MESSAGE WITH CSRF TOKEN (FIXED - NO DUPLICATES) ==========
    function sendMessage() {
        let message = messageInput.value.trim();
        
        if (!message) return;
        if (!socket || !currentUsername) {
            alert('Not connected to chat');
            return;
        }
        if (!csrfToken) {
            alert('Security token not ready. Please wait.');
            return;
        }
        
        // Check for private message (@username message)
        const privateMatch = message.match(/^@(\S+)\s+(.+)$/);
        
        if (privateMatch) {
            const targetUser = sanitizeInput(privateMatch[1]);
            const privateMsg = sanitizeInput(privateMatch[2]);
            
            // Send private message - NO local add (server will broadcast back)
            socket.emit('msg_user', targetUser, currentUsername, privateMsg, csrfToken);
            // Message will appear when server sends msg_user_handle event
        } else {
            // Public message - NO local add (server will broadcast back)
            const sanitizedMessage = sanitizeInput(message);
            socket.emit('sendchat', sanitizedMessage, csrfToken);
            // Message will appear when server sends updatechat event
        }
        
        // Clear input field
        messageInput.value = '';
    }
    
    // ========== EVENT LISTENERS ==========
    loginBtn.addEventListener('click', login);
    
    usernameInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') login();
    });
    
    sendBtn.addEventListener('click', sendMessage);
    
    messageInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    });
    
    // Disable right-click for extra security (optional)
    document.addEventListener('contextmenu', (e) => {
        // Uncomment to disable right-click
        // e.preventDefault();
    });
    
    console.log('%c🔒 SafeSocket Secure Chat - All security features active', 'color: #2c8392; font-size: 14px;');
    console.log('✅ XSS Protection: Active');
    console.log('✅ CSRF Protection: Active');
    console.log('✅ Secure WebSocket: Active');
</script>
</body>
</html>
